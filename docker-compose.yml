services:
  mongo:
    image: "mongo"
    networks:
      - app-network
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    ports:
      - 5000:5000
    depends_on:
      - mongo
    environment:
      - MONGO_URL=mongodb://mongo:27017/taskmanager
      - PORT=5000
    networks:
      - app-network

  frontend:
    build: ./frontend
    ports:
      - 80:80
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:

volumes:
  mongo_data: