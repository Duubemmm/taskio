services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - app-net

  backend:
    image: ghcr.io/duubemmm/taskio-backend:latest
    restart: unless-stopped
    environment:
      - PORT=5000
      - MONGO_URL=mongodb://mongo:27017/taskio
    networks:
      - app-net
    depends_on:
      - mongo

  frontend:
    image: ghcr.io/duubemmm/taskio-frontend:latest
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - app-net
    depends_on:
      - backend

volumes:
  mongo_data:

networks:
  app-net:
