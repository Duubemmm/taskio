name: CI/CD Pipeline

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - run: echo "building..."
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build backend image
        run: docker build -t ghcr.io/duubemmm/taskio-backend:latest ./backend

      - name: Push backend image
        run: docker push ghcr.io/duubemmm/taskio-backend:latest
        
      - name: Build frontend image
        run: docker build -t ghcr.io/duubemmm/taskio-frontend:latest ./frontend

      - name: Push frontend image
        run: docker push ghcr.io/duubemmm/taskio-frontend:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "deploying..."



      