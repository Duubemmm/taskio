name: CI/CD Pipeline

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - run: echo "building..."
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build backend image
        run: docker build -t ghcr.io/duubemmm/taskio-backend:latest ./backend

      - name: Push backend image
        run: docker push ghcr.io/duubemmm/taskio-backend:latest

      - name: Build frontend image
        run: docker build -t ghcr.io/duubemmm/taskio-frontend:latest ./frontend

      - name: Push frontend image
        run: docker push ghcr.io/duubemmm/taskio-frontend:latest

  deploy:
      needs: build
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4

        - name: Copy compose file to EC2
          uses: appleboy/scp-action@v0.1.7
          with:
            host: ${{ secrets.EC2_HOST }}
            username: ${{ secrets.EC2_USER }}
            key: ${{ secrets.EC2_SSH_KEY }}
            source: "docker-compose.prod.yml"
            target: "~/taskio"

        - name: Deploy to EC2
          uses: appleboy/ssh-action@v1.0.3
          with:
            host: ${{ secrets.EC2_HOST }}
            username: ${{ secrets.EC2_USER }}
            key: ${{ secrets.EC2_SSH_KEY }}
            script: |
              cd ~/taskio
              docker compose -f docker-compose.prod.yml pull
              docker compose -f docker-compose.prod.yml up -d
              docker image prune -f